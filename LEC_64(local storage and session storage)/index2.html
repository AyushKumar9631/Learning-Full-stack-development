<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.4s ease;
        }

        /* Base layout */
        #main-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Theme Classes */
        .theme-light {
            background-color: #f0f0f0;
            color: #333;
        }

        .theme-dark {
            background-color: #121212;
            color: #ffffff;
        }

        /* Glassmorphism Button */
        .glass-btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            
            /* Glass Effect */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            /* Inherit text color from parent theme */
            color: inherit;
            outline: none;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .glass-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Main container starting with dark theme -->
    <div id="main-container" class="theme-dark">
        
        <button id="theme-toggle" class="glass-btn">
            Toggle Theme
        </button>

    </div>

    <script src="script2.js"></script>
</body>
</html>
