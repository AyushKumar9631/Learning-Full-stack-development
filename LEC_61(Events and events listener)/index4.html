<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: gilroy;
        }

        html,body{
            width: 100%;
            height: 100%;
        }

        #main{
            padding: 50px;
            width: 100%;
            height: 100%;
            background-color: rgb(53, 52, 52);
        }

        input{
            display: block;
        }

        .card{
            max-width: 300px;
            color: #fff;
            margin-top: 40px;
            padding: 20px;
            display: inline-block;
            border: 1px solid #555;
            border-radius: 10px;

        }

        .profile{
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            margin-bottom: 10px;
            overflow: hidden;

        }

        .profile img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card p{
            font: 20px;
            margin-top: 10px;
        }

        .card h5{
            margin-top: 3px;
        }

    </style>

</head>
<body>
    <div id="main">
        <form action="">
            <input type="text" placeholder="profile pic">
            <input type="text" placeholder="name">
            <input type="text" placeholder="occupation">
            <input type="text" placeholder="info">
            <input type="submit">
        </form>
