<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: gilroy;
        }

        html,body{
            width: 100%;
            height: 100%;
        }

        #main{
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: rgb(53, 52, 52);
        }

        input{
            display: none;
        }

        #btn{
            padding: 12px 22px;
            background-color: rgb(8, 88, 80);
            color: white;
            border-radius: 5px;
        }

        #btn:hover{
            background-color: rgb(28, 80, 62);
        }

    </style>

</head>
<body>
    <div id="main">
        <input type="file" id="fileInp">
        <div id="btn">
            Upload file
        </div>
    </div>


    <script src="script3.js"></script>
</body>
</html>
