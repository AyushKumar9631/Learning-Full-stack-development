<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: gilroy;
        }

        html,body{
            width: 100%;
            height: 100%;
            background-color: rgb(185, 153, 153);
        }

        #main{
            min-width: 100%;
            height: 100%;
            background-color: #322;
    
        }

        #nav{
            min-width: 100%;
            height: 100px;
            background-color: #444;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }

        a{
            color: wheat;
        }

        button{
            padding: 12px 22px;
            background-color: rebeccapurple;
            border-radius: 5px;
            border: none;
            font-weight: 600;
            color: antiquewhite;
        }

        ul{
            padding: 30px;
        }

        li{
            font-size: 30px;
            user-select: none;
        }

        .lt{
            text-decoration: line-through;
        }
       
        
    </style>

</head>
<body>
    <div id="main">
        <div id="nav">
            <a href="">Home</a>
            <a href="">about</a>
            <button>click and follow</button>
        </div>

        <ul>
            <li>Apple</li>
            <li>Guava</li>
            <li>Grapes</li>
            <li>Banana</li>
            <li>Mango</li>
        </ul>
    </div>

    <script src="script6.js"></script>
</body>
</html>
