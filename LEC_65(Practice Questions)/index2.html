<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards and forms</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: cursive;
        
        }

        .main{
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient( 109.6deg,  rgba(112,246,255,0.33) 11.2%, rgba(221,108,241,0.26) 42%, rgba(229,106,253,0.71) 71.5%, rgba(123,183,253,1) 100.2% );
            display: flex;
            align-items: center;
            justify-content: center;
        }

        form{
            display: none;
            flex-direction: column;
            gap: 30px;
            border: 2px saddlebrown solid ;
            padding: 30px;
            border-radius: 30px;
            background-color: rgb(226, 125, 213);
        }

        input, select{
            height: 35px;
            width: 250px;
            border-radius: 10px;
            padding-left: 6px;
            background-color: rgb(218, 168, 226);
            color: rgb(118, 116, 116);
        

        }

        .buttonsdiv{
            display: flex;
            justify-content: space-evenly;
        }

        form button{
            padding: 8px;
            border-radius: 15px;
            background-color: rgb(118, 42, 113);
            color: white;
        }

        h3{
            display: flex;
            justify-content: center;
            font-weight: bolder;
            color: white;
        }

        .landingDiv{
            display: flex;
            justify-content: center;
        }

        .card{
            height: 250px;
            width: 400px;
            overflow: hidden;
            border-radius: 25px;
            border: solid 4px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        .E{
            border-color: red;
            background-color: rgba(255, 0, 0, 0.350);
        }
        .U{
            border-color: yellow;
            background-color: rgba(255, 255, 0, 0.350);
        }
        .I{
            border-color: orange;
            background-color: rgba(255, 166, 0, 0.350);
        }
        .N{
            border-color: green;
            background-color: rgba(0, 128, 0, 0.350);
        }

        .card-header{
            
            padding-right: 90px;
            display: flex;
            justify-content: space-between ;
            align-items: center;
        }

        #profile-pic{
            height: 70px;
            width: 70px;
            border-radius: 35px;
        }

        .leftButtons{
            height: 250px;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .rightButtons{
            height: 250px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .leftButtons img, .rightButtons button{
            height: 30px;
            width: 30px;
            border-radius: 15px;
            border: none;
        }

        #E {
            background-color: red;
        }

        #I {
            background-color: orange;
        }

        #U {
            background-color: yellow;
        }

        #N {
            background-color: green;
        }
        #B {
            background-color: black;
            color: white;
        }

    </style>
</head>
<body>
    <div class="main">
        <form>
            <h3>Fill Details:</h3>
            <input type="text" name="imageURL" id="imageURLinp", placeholder="Enter image URL">
            <input type="text" name="imageURL" id="nameinp", placeholder="Enter your name">
            <input type="text" name="imageURL" id="homeTowninp", placeholder="Enter your home town address">
            <input type="text" name="imageURL" id="Purpose", placeholder="Enter your porpose of visit">
            <select name="" id="categoryinp">
                <option value="P">Select Urgency Level</option>
                <option value="E">Emargency</option>
                <option value="I">Important</option>
                <option value="U">Urgent</option>
                <option value="N">No rush</option>
            </select>
            <div class="buttonsdiv">
                <button id="close">Close</button>
                <button id="submit" type="submit">Submit</button>
                
            </div>
            

        </form>

            <div class="card">
