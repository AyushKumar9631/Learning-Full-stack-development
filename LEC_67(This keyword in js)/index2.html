<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f7f8fa;
            margin: 0;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        form {
            background: #fff;
            padding: 24px 32px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            min-width: 300px;
            max-width: 400px;
            margin-bottom: 32px;
        }

        form label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }

        form input,
        form textarea {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        form input:focus,
        form textarea:focus {
            border-color: #0078d7;
            outline: none;
        }

        form button {
            background: #0078d7;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        form button:hover {
            background: #005fa3;
        }

        div[style*="display: flex"] {
            justify-content: center;
            flex-wrap: wrap;
        }

        div[style*="border:1px solid"] {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            transition: box-shadow 0.2s;
        }

        div[style*="border:1px solid"]:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
        }

        div[style*="border:1px solid"] img {
            margin-bottom: 12px;
            border: 3px solid #e3e6ea;
            background: #f2f4f8;
        }

        div[style*="border:1px solid"] h3 {
            margin: 8px 0 6px 0;
            font-size: 1.15rem;
            color: #222;
        }

        div[style*="border:1px solid"] p {
            margin: 4px 0;
            color: #555;
            font-size: 0.97rem;
        }
    </style>
</head>
<body>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age"><br><br>

        <label for="bio">Bio:</label>
        <textarea id="bio" name="bio" rows="3"></textarea><br><br>

        <label for="profileUrl">Profile Image URL:</label>
        <input type="url" id="profileUrl" name="profileUrl"><br><br>

        <button type="submit">Submit</button>
    </form>

    <div style="display: flex; gap: 16px; margin-top: 24px;">
        <div style="border:1px solid #ccc; padding:16px; width:200px; text-align:center;">
            <img src="https://randomuser.me/api/portraits/men/1.jpg" alt="Profile 1" style="width:100px; height:100px; border-radius:50%;">
            <h3>John Doe</h3>
            <p>Age: 28</p>
            <p>Web developer and tech enthusiast.</p>
        </div>
        <div style="border:1px solid #ccc; padding:16px; width:200px; text-align:center;">
            <img src="https://randomuser.me/api/portraits/women/2.jpg" alt="Profile 2" style="width:100px; height:100px; border-radius:50%;">
            <h3>Jane Smith</h3>
            <p>Age: 25</p>
            <p>Designer and creative thinker.</p>
        </div>
        <div style="border:1px solid #ccc; padding:16px; width:200px; text-align:center;">
            <img src="https://randomuser.me/api/portraits/men/3.jpg" alt="Profile 3" style="width:100px; height:100px; border-radius:50%;">
            <h3>Mike Lee</h3>
            <p>Age: 30</p>
            <p>Photographer and traveler.</p>
        </div>
    </div>
    <!-- <script src="script2.js"></script> -->
    <script src="script3.js"></script>
</body>
</html>
