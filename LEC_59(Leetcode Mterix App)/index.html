<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetMetric</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>LeetMetric</h1>

        <div class="userContainer">
            <p>Enter your user name below:</p>
            <div class="userInputContainer">
                <input type="text" placeholder="Enter Your UserName" id="userInput">
                <button id="searchButton">Search</button>
            </div>
        </div>

        <div class="statsContainer">

            <div class="progress">
                <div class="progressItem">
                    <div class="easyProgress circle" >
                        <span id="easyLabel"></span>
                        Easy
                    </div>
                </div>

                <div class="progressItem">
                    <div class="mediumProgress circle">
                        <span id="mediumLabel"></span>
                        Medium
                    </div>
                </div>

                <div class="progressItem">
                    <div class="hardProgress circle">
                        <span id="hardLabel"></span>
                        Hard
                    </div>
                </div>

            </div>

            <div class="statsCard">
                <!--directly populate card here from js -->
            </div>
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
