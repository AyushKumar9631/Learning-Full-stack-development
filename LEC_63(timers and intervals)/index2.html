<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .main{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            background-color: black;
        }
        .card{
            background-color: rgb(110, 106, 106);
            width: 350px;
            height: 200px;
            border-radius: 5%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bar{
            background-color: rgb(78, 78, 82);
            width: 60%;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress{
            background-color: rgb(189, 193, 189);
            height: 100%;
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="card">
            <div class="heading">
            <h3 id="a">downloading...</h3>
            </div>
            <div class="bar">
                <div class="progress"></div>
            </div>
            <h3 id="b">0%</h3>
        </div>
    </div>

    <script src="script2.js"></script>
</body>
</html>
